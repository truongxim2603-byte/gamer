        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fef3c7; /* Nền vàng nhạt tươi vui */
            background-image: radial-gradient(#fde68a 15%, transparent 15%),
                              radial-gradient(#fde68a 15%, transparent 15%);
            background-position: 0 0, 30px 30px;
            background-size: 60px 60px;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* Tỉ lệ màn hình 16:9 tối ưu cho máy tính bảng và màn hình ngang */
        .game-container {
            aspect-ratio: 16 / 9;
            width: 100%;
            max-width: 1100px;
            margin: auto;
        }

        @media (max-width: 768px) {
            .game-container {
                aspect-ratio: auto;
                min-height: 100vh;
            }
        }

        .shadow-bubble {
            box-shadow: 0 10px 0px #d97706;
        }

        .shadow-card {
            box-shadow: 0 8px 0px #e2e8f0;
        }

        .shadow-btn-green {
            box-shadow: 0 8px 0px #15803d;
        }

        .shadow-btn-orange {
            box-shadow: 0 8px 0px #c2410c;
        }

        /* Pháo hoa và hiệu ứng bay bổng */
        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            z-index: 100;
            pointer-events: none;
        }

        .star-sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkleAnim 1s ease-out forwards;
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }

        /* Nút quay nảy mầm non */
        .btn-spin-anim {
            animation: pulseMini 1.5s infinite;
        }

        @keyframes pulseMini {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Hiệu ứng rung rinh đáng yêu */
        .wiggle {
            animation: wiggleAnim 0.5s ease-in-out infinite alternate;
        }

        @keyframes wiggleAnim {
            0% { transform: rotate(-3deg); }
            100% { transform: rotate(3deg); }
        }

        /* Màn hình chuyển động mượt */
        .screen-fade {
            transition: all 0.5s ease-in-out;
        }
    </style>

    <!-- AUDIO GENERATION USING WEB AUDIO API (For instant offline sounds) -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'tick') {
                // Tiếng vòng quay nhấp nháy
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'correct') {
                // Tiếng chuông vui tai (Thành công)
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.15); // A5
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'wrong') {
                // Tiếng "oọc oọc" nhẹ nhàng báo sai
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.25);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'victory') {
                // Một chuỗi nốt nhạc hoành tráng ăn mừng kết quả cao
                const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
                notes.forEach((freq, idx) => {
                    const oscSeq = audioCtx.createOscillator();
                    const gainSeq = audioCtx.createGain();
                    oscSeq.connect(gainSeq);
                    gainSeq.connect(audioCtx.destination);

                    oscSeq.type = 'sine';
                    oscSeq.frequency.setValueAtTime(freq, now + idx * 0.1);
                    gainSeq.gain.setValueAtTime(0.15, now + idx * 0.1);
                    gainSeq.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.1 + 0.3);

                    oscSeq.start(now + idx * 0.1);
                    oscSeq.stop(now + idx * 0.1 + 0.3);
                });
            }
        }

        // Đọc thuyết minh to, rõ tiếng Việt cho mầm non
        function speak(text) {
            if ('speechSynthesis' in window) {
                // Huỷ bỏ các giọng cũ đang đọc dở để tránh trễ
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.85; // Tốc độ hơi chậm cho các bé dễ nghe
                utterance.pitch = 1.2; // Tông giọng cao vui tươi hơn
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>

                sliceColor: "#eab308",
                textColor: "#ffffff",
                svg: `<svg viewBox="0 0 100 100" class="w-32 h-32 md:w-40 md:h-40"><ellipse cx="50" cy="60" rx="22" ry="28" fill="#eab308"/><path d="M50,35 Q55,10 40,5" fill="none" stroke="#15803d" stroke-width="5" stroke-linecap="round"/><path d="M50,35 Q40,12 50,5" fill="none" stroke="#15803d" stroke-width="5" stroke-linecap="round"/><path d="M50,35 Q65,15 60,5" fill="none" stroke="#15803d" stroke-width="5" stroke-linecap="round"/><line x1="35" y1="45" x2="65" y2="75" stroke="#ca8a04" stroke-width="2"/><line x1="65" y1="45" x2="35" y2="75" stroke="#ca8a04" stroke-width="2"/></svg>`
            }
        ];

        let score = 0;
        let turns = 0;
        let isSpinning = false;
        let currentItem = null;
        let hasAnswered = false;

        // Vẽ Vòng Quay
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const numSlices = items.length;
        const sliceAngle = (2 * Math.PI) / numSlices;
        let currentRotation = 0;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const radius = canvas.width / 2;
            ctx.save();
            ctx.translate(radius, radius);
            ctx.rotate(currentRotation);

            for (let i = 0; i < numSlices; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius - 10, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.closePath();
                ctx.fillStyle = items[i].sliceColor;
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                // Vẽ tên chữ cái to ở giữa lát cắt
                ctx.save();
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#ffffff';
                ctx.font = '900 32px Nunito';
                // Chỉ hiển thị chữ cái mục tiêu lên vòng quay
                ctx.fillText(items[i].letter, radius - 45, 0);

                // Vẽ vòng tròn điểm nhấn nhỏ
                ctx.beginPath();
                ctx.arc(radius - 25, 0, 8, 0, 2 * Math.PI);
                ctx.fillStyle = '#fef08a';
                ctx.fill();

                ctx.restore();
            }
            ctx.restore();

            // Vẽ viền ngoài cùng của vòng quay mầm non
            ctx.beginPath();
            ctx.arc(radius, radius, radius - 5, 0, 2 * Math.PI);
            ctx.lineWidth = 8;
            ctx.strokeStyle = '#f59e0b';
            ctx.stroke();

            // Vẽ chấm tròn nhỏ vàng quanh viền
            for (let i = 0; i < 16; i++) {
                const angle = (i * 2 * Math.PI) / 16;
                const x = radius + (radius - 12) * Math.cos(angle);
                const y = radius + (radius - 12) * Math.sin(angle);
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, 2 * Math.PI);
                ctx.fillStyle = '#fef08a';
                ctx.fill();
            }
        }

        // BẮT ĐẦU CHƠI
        function startGame() {
            score = 0;
            turns = 0;
            isSpinning = false;
            currentItem = null;
            hasAnswered = false;

            document.getElementById('score-text').textContent = score;
            document.getElementById('turn-text').textContent = `${turns}/10`;

            // Chuyển đổi màn hình mượt mà
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');

            resetQuestionBox();
            drawWheel();
            speak("Chào mừng bé đến với vòng quay kỳ diệu chữ cái u và ư! Bé hãy nhấn nút quay nhé!");
        }

        // TRỞ VỀ MENU CHÍNH
        function goHome() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
            hideFeedback();
        }

        // QUAY VÒNG QUAY
        function spinWheel() {
            if (isSpinning) return;
            if (turns >= 10) {
                endGame();
                return;
            }

            isSpinning = true;
            hasAnswered = false;
            hideFeedback();

            const btnSpin = document.getElementById('btn-spin');
            btnSpin.classList.remove('btn-spin-anim');
            btnSpin.disabled = true;

            // Ẩn bảng đáp án trước khi quay xong
            document.getElementById('answers-box').classList.add('hidden');
            document.getElementById('question-box').innerHTML = `
                <div class="text-2xl font-black text-amber-600 animate-pulse">Vòng quay đang xoay tít... 🌀</div>
                <div class="text-7xl mt-4 animate-spin">🎡</div>
            `;
            speak("Vòng quay bắt đầu quay!");

            const spinDuration = 3000; // Thời gian quay 3 giây
            const startTimestamp = performance.now();
            const startRotation = currentRotation;
            
            // Tính toán góc dừng ngẫu nhiên ở một phần tử ngẫu nhiên
            const targetIndex = Math.floor(Math.random() * numSlices);
            currentItem = items[targetIndex];

            // Để kim chỉ ở đỉnh (góc -PI/2 tương đương với 270 độ) quay trúng phần tử
            // Ta tính góc cần quay
            const targetAngle = (2 * Math.PI) - (targetIndex * sliceAngle + sliceAngle / 2) - (Math.PI / 2);
            const extraSpins = 4 * 2 * Math.PI; // Quay thêm 4 vòng đầy cho hoành tráng
            const finalRotation = startRotation + extraSpins + targetAngle;

            let lastTickTime = 0;

            function animateSpin(now) {
                const elapsed = now - startTimestamp;
                const progress = Math.min(elapsed / spinDuration, 1);
                
                // Hiệu ứng giảm tốc mượt mà (Ease Out Cubic)
                const easeOut = 1 - Math.pow(1 - progress, 3);
                currentRotation = startRotation + (finalRotation - startRotation) * easeOut;

                drawWheel();

                // Tạo âm thanh tik tik nhẹ nhàng khi đổi lốc quay
                if (now - lastTickTime > 120 && progress < 0.9) {
                    playSound('tick');
                    lastTickTime = now;
                }

                if (progress < 1) {
                    requestAnimationFrame(animateSpin);
                } else {
                    onSpinComplete();
                }
            }

            requestAnimationFrame(animateSpin);
        }

        // KHI VÒNG QUAY DỪNG LẠI
        function onSpinComplete() {
            isSpinning = false;
            const btnSpin = document.getElementById('btn-spin');
            btnSpin.disabled = false;
            btnSpin.classList.add('btn-spin-anim');

            turns++;
            document.getElementById('turn-text').textContent = `${turns}/10`;

            // Hiển thị câu hỏi dạng thẻ sinh động
            const questionBox = document.getElementById('question-box');
            questionBox.innerHTML = `
                <div class="bg-white p-4 rounded-3xl border-4 border-amber-300 w-full flex flex-col items-center shadow-card animate-bounce">
                    <div id="item-illustration" class="h-40 flex items-center justify-center">
                        ${currentItem.svg}
                    </div>
                    <div class="text-3xl font-black text-gray-800 tracking-wider uppercase mt-2">
                        ${currentItem.name}
                    </div>
                </div>
                <div class="text-lg md:text-xl font-bold text-amber-800 mt-4">
                    Từ "${currentItem.name.toUpperCase()}" chứa chữ cái nào?
                </div>
            `;

            // Hiện các nút bấm lựa chọn U và Ư
            document.getElementById('answers-box').classList.remove('hidden');

            // Đọc từ vựng
            speak(currentItem.name);
        }

        // BÉ CHỌN ĐÁP ÁN (U hoặc Ư)
        function chooseAnswer(answer) {
            if (hasAnswered) return;

            if (answer === currentItem.letter) {
                // CHỌN ĐÚNG
                hasAnswered = true;
                score += 10;
                document.getElementById('score-text').textContent = score;

                // Hiệu ứng lấp lánh và pháo giấy
                playSound('correct');
                createConfetti(25);
                triggerSparkles();

                showFeedback("Chính xác! Bé thật giỏi! 🎉", "bg-green-500");
                speak(`Chính xác! Bé thật giỏi! Đây là chữ ${currentItem.letter}`);

                // highlight chữ cái đúng
                setTimeout(() => {
                    if (turns >= 10) {
                        endGame();
                    } else {
                        resetQuestionBox();
                    }
                }, 3000);

            } else {
                // CHỌN SAI
                playSound('wrong');
                showFeedback("Con hãy thử lại nhé! 🧐", "bg-orange-500");
                speak("Con hãy thử lại nhé!");
            }
        }

        // RESET KHU VỰC CÂU HỎI VỀ TRẠNG THÁI CHỜ
        function resetQuestionBox() {
            const questionBox = document.getElementById('question-box');
            questionBox.innerHTML = `
                <div class="text-xl font-black text-amber-800 mb-2">Bé hãy quay vòng quay nhé!</div>
                <div class="text-6xl text-amber-500 animate-bounce">👇</div>
            `;
            document.getElementById('answers-box').classList.add('hidden');
            hideFeedback();
        }

        // HIỂN THỊ DÒNG PHẢN HỒI
        function showFeedback(text, bgClass) {
            const banner = document.getElementById('feedback-banner');
            banner.textContent = text;
            banner.className = `opacity-100 transition-opacity duration-300 w-full text-center py-3 px-4 rounded-2xl text-xl md:text-2xl font-black text-white mt-2 ${bgClass}`;
        }

        function hideFeedback() {
            const banner = document.getElementById('feedback-banner');
            banner.classList.remove('opacity-100');
            banner.classList.add('opacity-0');
        }

        // TỔNG KẾT TRÒ CHƠI
        function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            hideFeedback();

            const endTitle = document.getElementById('end-title');
            const endMsg = document.getElementById('end-msg');
            const endEmoji = document.getElementById('end-emoji');

            if (score >= 80) {
                // ĐẠT ĐIỂM CAO (MÚC TIÊU CHIẾN THẮNG)
                endEmoji.textContent = "👑";
                endTitle.textContent = "Bé đã chinh phục vòng quay!";
                endMsg.textContent = `Bé xuất sắc đạt được ${score} điểm!`;
                playSound('victory');
                createConfetti(60);
                speak("Tuyệt vời! Bé đã chinh phục được vòng quay kỳ diệu chữ cái u và ư!");
            } else {
                // CẦN NỖ LỰC THÊM
                endEmoji.textContent = "💪";
                endTitle.textContent = "Cố gắng lên nhé!";
                endMsg.textContent = `Bé đạt được ${score} điểm. Hãy luyện tập thêm nha!`;
                speak("Bé đạt được " + score + " điểm. Hãy thử sức lại một lần nữa để đạt điểm cao hơn nhé!");
            }
        }

        // TUNG PHÁO HOA/PHÁO GIẤY
        function createConfetti(amount = 25) {
            const colors = ['#f43f5e', '#3b82f6', '#10b981', '#fbbf24', '#a855f7', '#f472b6'];
            for (let i = 0; i < amount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                
                if (Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }
                
                document.body.appendChild(confetti);

                const duration = Math.random() * 2 + 1.5;
                confetti.animate([
                    { transform: 'translate3d(0,0,0) rotate(0deg)', opacity: 1 },
                    { transform: `translate3d(${Math.random() * 200 - 100}px, 100vh, 0) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: duration * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)',
                    fill: 'forwards'
                });

                setTimeout(() => confetti.remove(), duration * 1000);
            }
        }

        // TẠO NGÔI SAO LẤP LÁNH XUNG QUANH
        function triggerSparkles() {
            const qBox = document.getElementById('question-box');
            const rect = qBox.getBoundingClientRect();
            
            for (let i = 0; i < 15; i++) {
                const star = document.createElement('div');
                star.innerHTML = "⭐";
                star.classList.add('star-sparkle', 'text-2xl');
                star.style.left = `${Math.random() * rect.width}px`;
                star.style.top = `${Math.random() * rect.height}px`;
                qBox.appendChild(star);

                setTimeout(() => star.remove(), 1000);
            }
        }
    </script>
</body>
